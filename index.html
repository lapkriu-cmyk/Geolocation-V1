<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Pendataan Lokasi Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background-color: #eef2f5; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        
        input, button { padding: 12px; margin: 6px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        input:focus { border-color: #007BFF; outline: none; }
        
        .flex-row { display: flex; gap: 8px; }
        .flex-row input { flex: 1; }
        .flex-row button { width: auto; padding: 12px 20px; background-color: #6c757d; }
        
        button { cursor: pointer; font-weight: bold; border: none; color: white; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button.lokasi { background-color: #007BFF; }
        button.tambah { background-color: #ff9800; font-size: 16px; margin-top: 15px; }
        button.export { background-color: #28a745; margin-top: 20px; }
        button.hapus { background-color: #dc3545; padding: 6px 12px; font-size: 12px; margin: 0; border-radius: 4px; }
        button.hapus-semua { background-color: #dc3545; margin-top: 10px; }

        #map { height: 320px; margin: 15px 0; border-radius: 8px; border: 1px solid #ccc; z-index: 1; }
        
        .tabel-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px 10px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; color: #333; }
        
        .badge { display: inline-block; padding: 4px 8px; background: #e3f2fd; color: #007bff; border-radius: 12px; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📍 Data Lokasi Pro</h2>
        
        <div class="flex-row">
            <input type="text" id="cariArea" placeholder="Cari kecamatan / jalan...">
            <button onclick="cariLokasiPeta()">🔍 Cari</button>
        </div>

        <button class="lokasi" onclick="dapatkanLokasiGPS()">🎯 Gunakan GPS HP Saat Ini</button>
        
        <div id="map"></div>
        <div style="text-align: center;"><span class="badge">Geser pin merah untuk penyesuaian akhir</span></div>
        
        <div class="flex-row">
            <input type="text" id="latitude" placeholder="Latitude" readonly>
            <input type="text" id="longitude" placeholder="Longitude" readonly>
        </div>
        
        <input type="text" id="namaKonsumen" placeholder="Masukkan Nama / Kode Konsumen" required>
        
        <button class="tambah" onclick="simpanKeTabel()">➕ Simpan Data</button>

        <div class="tabel-container">
            <table id="tabelLokasi">
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Lat, Long</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="isiTabel">
                    </tbody>
            </table>
        </div>

        <button class="export" onclick="exportKeExcel()">📥 Download Excel (CSV)</button>
        <button class="hapus-semua" onclick="kosongkanData()">🗑️ Hapus Semua Data</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Array untuk menampung data (diambil dari memori HP jika ada)
        let dataKonsumen = JSON.parse(localStorage.getItem('databaseLokasi')) || [];
        
        // Setup Peta
        var map = L.map('map').setView([-2.548926, 118.014863], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
        var marker = L.marker([-2.548926, 118.014863], { draggable: true }).addTo(map);
        var radiusAkurasi; // Variabel untuk lingkaran biru

        // Render tabel saat pertama kali dibuka
        renderTabel();

        // Update teks Lat/Long
        function updateInputTeks(lat, lng) {
            document.getElementById('latitude').value = lat.toFixed(6);
            document.getElementById('longitude').value = lng.toFixed(6);
        }

        // Event saat pin digeser atau peta diklik
        marker.on('dragend', function (e) { updateInputTeks(marker.getLatLng().lat, marker.getLatLng().lng); });
        map.on('click', function(e) { 
            marker.setLatLng(e.latlng); 
            updateInputTeks(e.latlng.lat, e.latlng.lng); 
        });

        // Fitur Pencarian Alamat lewat API Nominatim (Gratis)
        function cariLokasiPeta() {
            let kataKunci = document.getElementById('cariArea').value;
            if(!kataKunci) return alert("Ketik nama daerah terlebih dahulu!");
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${kataKunci}`)
                .then(response => response.json())
                .then(data => {
                    if(data.length > 0) {
                        let lat = parseFloat(data[0].lat);
                        let lon = parseFloat(data[0].lon);
                        let posisiBaru = new L.LatLng(lat, lon);
                        
                        map.setView(posisiBaru, 15);
                        marker.setLatLng(posisiBaru);
                        updateInputTeks(lat, lon);
                    } else {
                        alert("Lokasi tidak ditemukan. Coba kata kunci lain.");
                    }
                })
                .catch(err => alert("Gagal mencari lokasi. Pastikan internet menyala."));
        }

        // Fitur GPS HP + Lingkaran Akurasi
        function dapatkanLokasiGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        let lat = position.coords.latitude;
                        let lon = position.coords.longitude;
                        let akurasi = position.coords.accuracy; // dalam satuan meter
                        
                        let posisiBaru = new L.LatLng(lat, lon);
                        map.setView(posisiBaru, 18);
                        marker.setLatLng(posisiBaru);
                        updateInputTeks(lat, lon);

                        // Hapus lingkaran lama jika ada, buat yang baru
                        if(radiusAkurasi) { map.removeLayer(radiusAkurasi); }
                        radiusAkurasi = L.circle(posisiBaru, { radius: akurasi, color: '#007BFF', fillColor: '#007BFF', fillOpacity: 0.2 }).addTo(map);
                    },
                    function(error) { alert("Gagal membaca GPS. Coba gunakan fitur pencarian atau geser peta secara manual."); },
                    { enableHighAccuracy: true } // Memaksa HP pakai satelit GPS, bukan cuma sinyal operator
                );
            }
        }

        // Simpan ke Array & LocalStorage
        function simpanKeTabel() {
            let nama = document.getElementById('namaKonsumen').value;
            let lat = document.getElementById('latitude').value;
            let lon = document.getElementById('longitude').value;

            if(nama === "" || lat === "" || lon === "") {
                return alert("Mohon lengkapi nama dan lokasi peta!");
            }

            // Push ke array
            dataKonsumen.push({ nama: nama, latitude: lat, longitude: lon });
            
            // Simpan ke memori HP
            localStorage.setItem('databaseLokasi', JSON.stringify(dataKonsumen));
            
            // Bersihkan form
            document.getElementById('namaKonsumen').value = "";
            renderTabel();
        }

        // Tampilkan data ke HTML
        function renderTabel() {
            let tbody = document.getElementById('isiTabel');
            tbody.innerHTML = ""; // Kosongkan dulu
            
            dataKonsumen.forEach((item, index) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.nama}</strong></td>
                    <td><span style="font-size: 11px; color: #555;">${item.latitude},<br>${item.longitude}</span></td>
                    <td><button class="hapus" onclick="hapusBaris(${index})">Hapus</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Hapus 1 Baris Data
        function hapusBaris(index) {
            if(confirm("Yakin ingin menghapus data ini?")) {
                dataKonsumen.splice(index, 1); // Buang data dari array
                localStorage.setItem('databaseLokasi', JSON.stringify(dataKonsumen)); // Update memori
                renderTabel(); // Update tampilan
            }
        }

        // Hapus Semua Data setelah export (misal ganti hari)
        function kosongkanData() {
            if(confirm("PERINGATAN! Semua data di tabel akan dihapus. Sudah di-download ke Excel?")) {
                dataKonsumen = [];
                localStorage.removeItem('databaseLokasi');
                renderTabel();
            }
        }

        // Export Array ke CSV
        function exportKeExcel() {
            if(dataKonsumen.length === 0) return alert("Tabel masih kosong!");
            
            let csv = ["Nama Konsumen,Latitude,Longitude"]; // Header
            dataKonsumen.forEach(item => {
                // Tambah tanda kutip agar aman dari karakter aneh
                csv.push(`"${item.nama}","${item.latitude}","${item.longitude}"`);
            });

            let csvFile = new Blob([csv.join("\n")], {type: "text/csv"});
            let downloadLink = document.createElement("a");
            
            // Otomatis kasih nama file sesuai tanggal hari ini
            let tanggal = new Date().toISOString().slice(0,10);
            downloadLink.download = `Data_Lokasi_${tanggal}.csv`;
            
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
        }
    </script>
</body>
</html>
